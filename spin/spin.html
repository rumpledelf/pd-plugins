<div class="spin-module">
  <div class="spin-stage">
    <svg class="spin-fan" viewBox="0 0 280 280" role="img" aria-label="Three-blade fan">
      <circle class="spin-guard" cx="140" cy="140" r="118"></circle>
      <circle class="spin-guard-inner" cx="140" cy="140" r="92"></circle>
      <g id="spin-rotor" class="spin-rotor spin-clockwise">
        <path class="spin-blade" d="M 140 140 C 146 128 160 99 168 72 C 175 47 167 28 148 24 C 132 20 119 34 118 54 C 117 83 129 118 140 140 Z"></path>
        <path class="spin-blade" d="M 140 140 C 146 128 160 99 168 72 C 175 47 167 28 148 24 C 132 20 119 34 118 54 C 117 83 129 118 140 140 Z" transform="rotate(120 140 140)"></path>
        <path class="spin-blade" d="M 140 140 C 146 128 160 99 168 72 C 175 47 167 28 148 24 C 132 20 119 34 118 54 C 117 83 129 118 140 140 Z" transform="rotate(240 140 140)"></path>
        <circle class="spin-hub" cx="140" cy="140" r="18"></circle>
      </g>
      <circle class="spin-cap" cx="140" cy="140" r="8"></circle>
    </svg>
  </div>
  <div class="spin-controls">
    <button type="button" id="spin-clockwise">Clockwise</button>
    <button type="button" id="spin-counterclockwise">Counterclockwise</button>
    <button type="button" id="spin-stop">Stop</button>
  </div>
</div>
