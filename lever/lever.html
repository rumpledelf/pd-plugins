<div class="lever-module">
  <div class="lever-canvas-wrapper">
    <svg id="lever-svg" viewBox="0 0 600 400" width="100%" height="100%">
      <!-- Sky Background (drawn inside SVG) -->
      <rect x="0" y="0" width="600" height="240" class="sky-rect" />
      
      <!-- Grass Line -->
      <line x1="0" y1="284" x2="600" y2="284" class="grass-line" />
      
      <!-- Dynamic Fulcrum (moved horizontally in JS) -->
      <polygon id="fulcrum" points="254,280 300,200 346,280" class="fulcrum-poly" />
      
      <!-- Beam Group (rotates around the fulcrum apex) -->
      <g id="beam-group">
        <!-- Rigid Grey Beam -->
        <rect x="50" y="180" width="500" height="20" class="beam-rect" />
        
        <!-- Slot Points -->
        <g id="slots-group">
          <circle cx="90" cy="190" r="5" class="slot-circle" />
          <circle cx="160" cy="190" r="5" class="slot-circle" />
          <circle cx="230" cy="190" r="5" class="slot-circle" />
          <circle cx="300" cy="190" r="5" class="slot-circle" />
          <circle cx="370" cy="190" r="5" class="slot-circle" />
          <circle cx="440" cy="190" r="5" class="slot-circle" />
          <circle cx="510" cy="190" r="5" class="slot-circle" />
        </g>
        
        <!-- Boulders placed on the beam will be appended here dynamically by JS to rotate with it -->
      </g>
      
      <!-- Shadows for Boulders on the Ground -->
      <g id="shadows-group">
        <ellipse id="shadow-large" cx="150" cy="385" rx="36" ry="7" class="boulder-shadow" />
        <ellipse id="shadow-medium" cx="250" cy="385" rx="28" ry="6" class="boulder-shadow" />
        <ellipse id="shadow-small" cx="350" cy="385" rx="20" ry="5" class="boulder-shadow" />
        <ellipse id="shadow-micro" cx="430" cy="385" rx="14" ry="4" class="boulder-shadow" />
      </g>
      
      <!-- Boulders in the Grass by default or when dragged -->
      <g id="boulders-container">
        <!-- Large Boulder -->
        <g id="boulder-large" class="boulder draggable" data-mass="8" data-size="large" transform="translate(150, 385)">
          <path d="M -23 0 L -32 -17 L -28 -40 L -17 -63 L -8 -76 L 0 -80 L 8 -76 L 16 -61 L 25 -40 L 30 -17 L 23 0 Z" class="boulder-outline" />
          <path d="M -23 0 L -32 -17 L -28 -40 L -17 -63 L -8 -76 L 0 -80 L 8 -76 L 16 -61 L 25 -40 L 30 -17 L 23 0 Z" class="boulder-highlight" transform="translate(2.3, -2.3) scale(0.8)" />
          <path d="M -23 0 L -14 -14 M 23 0 L 14 -14 M -28 -40 L -16 -37 M 25 -40 L 14 -38 M -17 -63 L -9 -52" class="boulder-detail" />
        </g>
        
        <!-- Medium Boulder -->
        <g id="boulder-medium" class="boulder draggable" data-mass="4" data-size="medium" transform="translate(250, 385)">
          <path d="M -16 0 L -22 -12 L -18 -28 L -6 -54 L 0 -58 L 6 -54 L 17 -28 L 21 -12 L 16 0 Z" class="boulder-outline" />
          <path d="M -16 0 L -22 -12 L -18 -28 L -6 -54 L 0 -58 L 6 -54 L 17 -28 L 21 -12 L 16 0 Z" class="boulder-highlight" transform="translate(1.7, -1.7) scale(0.8)" />
          <path d="M -16 0 L -9 -9 M 16 0 L 9 -9 M -18 -28 L -11 -25 M 17 -28 L 10 -25 M -12 -44 L -6 -37" class="boulder-detail" />
        </g>
        
        <!-- Small Boulder -->
        <g id="boulder-small" class="boulder draggable" data-mass="2" data-size="small" transform="translate(350, 385)">
          <path d="M -12 0 L -16 -9 L -13 -20 L -4 -39 L 0 -42 L 4 -39 L 12 -20 L 15 -9 L 12 0 Z" class="boulder-outline" />
          <path d="M -12 0 L -16 -9 L -13 -20 L -4 -39 L 0 -42 L 4 -39 L 12 -20 L 15 -9 L 12 0 Z" class="boulder-highlight" transform="translate(1.2, -1.2) scale(0.8)" />
          <path d="M -12 0 L -7 -7 M 12 0 L 7 -7 M -13 -20 L -8 -19 M -2 -29 L -4 -20" class="boulder-detail" />
        </g>
        
        <!-- Micro Boulder -->
        <g id="boulder-micro" class="boulder draggable" data-mass="1" data-size="micro" transform="translate(430, 385)">
          <path d="M -9 0 L -12 -6 L -10 -14 L -3 -28 L 0 -30 L 3 -28 L 9 -14 L 11 -6 L 9 0 Z" class="boulder-outline" />
          <path d="M -9 0 L -12 -6 L -10 -14 L -3 -28 L 0 -30 L 3 -28 L 9 -14 L 11 -6 L 9 0 Z" class="boulder-highlight" transform="translate(0.9, -0.9) scale(0.8)" />
          <path d="M -9 0 L -5 -5 M 9 0 L 5 -5 M -2 -21 L -3 -14" class="boulder-detail" />
        </g>
      </g>
    </svg>
  </div>
  
  <div class="lever-controls">
    <div class="buttons-row">
      <button type="button" id="reset-button">Reset</button>
    </div>
    
    <div class="status-panel">
      <span id="balance-status" class="balance-state status-balanced">Balanced</span>
    </div>
  </div>
</div>
