<div class="speed-module">
  <div class="speed-stage">
    <canvas
      id="speed-canvas"
      class="speed-canvas"
      width="540"
      height="250"
      aria-label="Animated stick figure demonstrating walking and running speed"
      role="img"
    ></canvas>
  </div>
  <div class="speed-controls">
    <label for="speed-slider" class="speed-slider-label">Adjust speed</label>
    <input type="range" id="speed-slider" min="0" max="1" step="0.01" value="0">
    <div class="speed-labels" aria-hidden="true">
      <span>WALK</span>
      <span>RUN</span>
    </div>
  </div>
</div>
