<div class="piano-module">
  <p class="piano-hint">Click the keys to play a one-octave piano.</p>
  <div class="piano-keyboard" aria-label="One octave piano keyboard" role="group">
    <button type="button" class="piano-key piano-key-white" data-note="C4" aria-label="C">C</button>
    <button type="button" class="piano-key piano-key-black" data-note="C#4" aria-label="C sharp">C#</button>
    <button type="button" class="piano-key piano-key-white" data-note="D4" aria-label="D">D</button>
    <button type="button" class="piano-key piano-key-black" data-note="D#4" aria-label="D sharp">D#</button>
    <button type="button" class="piano-key piano-key-white" data-note="E4" aria-label="E">E</button>
    <button type="button" class="piano-key piano-key-white" data-note="F4" aria-label="F">F</button>
    <button type="button" class="piano-key piano-key-black" data-note="F#4" aria-label="F sharp">F#</button>
    <button type="button" class="piano-key piano-key-white" data-note="G4" aria-label="G">G</button>
    <button type="button" class="piano-key piano-key-black" data-note="G#4" aria-label="G sharp">G#</button>
    <button type="button" class="piano-key piano-key-white" data-note="A4" aria-label="A">A</button>
    <button type="button" class="piano-key piano-key-black" data-note="A#4" aria-label="A sharp">A#</button>
    <button type="button" class="piano-key piano-key-white" data-note="B4" aria-label="B">B</button>
    <button type="button" class="piano-key piano-key-white" data-note="C5" aria-label="High C">C</button>
  </div>
</div>
