<div class="bubbles-module">
  <div class="bubbles-canvas-container">
    <canvas id="bubbles-canvas" width="600" height="350"></canvas>
  </div>
  <div class="bubbles-controls">
    <button type="button" id="bubbles-start">Start</button>
    <button type="button" id="bubbles-stop">Stop</button>
    <button type="button" id="bubbles-restart">Restart</button>
    <span id="bubbles-stats" class="greentext" aria-live="polite">Popped: 0 | Speed: 1.0x</span>
  </div>
</div>
