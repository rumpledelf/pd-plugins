<div class="wax-wane-module">
  <svg class="wax-wane-canvas" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Background linear gradient -->
      <linearGradient id="sky-gradient" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#000000" />
        <stop offset="100%" stop-color="#1e1e2e" />
      </linearGradient>

      <!-- ClipPath for moon phases, updated dynamically via JS -->
      <clipPath id="moon-clip">
        <path id="moon-clip-path" d="M 0 -40 A 40 40 0 0 1 0 40 A 40 40 0 0 0 0 -40 Z" />
      </clipPath>
    </defs>

    <!-- 1. Background sky -->
    <rect width="600" height="400" fill="url(#sky-gradient)" />

    <!-- 2. Stars Layer (Behind moon and hills) -->
    <g id="wax-wane-stars" class="time-lapse-group">
      <!-- 15 stars with fixed coordinates distributed in the sky -->
      <circle cx="80" cy="50" r="1.4" fill="#ffffff" />
      <circle cx="150" cy="90" r="1.2" fill="#ffffff" />
      <circle cx="220" cy="40" r="1.8" fill="#ffffff" />
      <circle cx="280" cy="110" r="1.0" fill="#ffffff" />
      <circle cx="340" cy="60" r="1.6" fill="#ffffff" />
      <circle cx="410" cy="80" r="1.3" fill="#ffffff" />
      <circle cx="490" cy="45" r="1.8" fill="#ffffff" />
      <circle cx="540" cy="100" r="1.1" fill="#ffffff" />
      <circle cx="100" cy="150" r="1.4" fill="#ffffff" />
      <circle cx="180" cy="180" r="1.6" fill="#ffffff" />
      <circle cx="250" cy="160" r="1.2" fill="#ffffff" />
      <circle cx="380" cy="140" r="1.5" fill="#ffffff" />
      <circle cx="460" cy="170" r="1.3" fill="#ffffff" />
      <circle cx="520" cy="130" r="1.8" fill="#ffffff" />
      <circle cx="60" cy="110" r="1.2" fill="#ffffff" />
    </g>

    <!-- 3. Moon Layer (Behind hills, in front of stars) -->
    <g id="wax-wane-moon" class="time-lapse-group" transform="translate(50, 300)">
      <!-- Solid black base to represent the unlit dark side of the moon -->
      <circle r="40" fill="#000000" />
      <!-- Illuminated part of the moon -->
      <g clip-path="url(#moon-clip)">
        <!-- Moon body -->
        <circle r="40" fill="#e0e0e0" />
        <!-- Moon craters -->
        <ellipse cx="-15" cy="-10" rx="6" ry="4" fill="#b0b0b0" opacity="0.6" />
        <ellipse cx="12" cy="-18" rx="8" ry="6" fill="#b0b0b0" opacity="0.6" />
        <ellipse cx="18" cy="12" rx="5" ry="4" fill="#b0b0b0" opacity="0.6" />
        <ellipse cx="-12" cy="18" rx="7" ry="5" fill="#b0b0b0" opacity="0.6" />
        <ellipse cx="0" cy="5" rx="9" ry="7" fill="#a0a0a0" opacity="0.5" />
      </g>
    </g>

    <!-- 4. Mid Layer: Solid black silhouette of rolling hills (In front of moon and stars) -->
    <g fill="#000000">
      <!-- Back hill -->
      <path d="M -50 400 L -50 340 Q 150 220 350 320 Q 500 370 650 330 L 650 400 Z" />
      <!-- Front hill -->
      <path d="M -50 400 L -50 380 Q 100 350 250 300 Q 450 200 650 280 L 650 400 Z" />
    </g>

    <!-- 5. Text Overlay: Combined Day + Phase Counter in signature site orange -->
    <text id="wax-wane-day-counter" x="30" y="370" fill="#D97A00" font-family="Inter, sans-serif" font-size="20" font-weight="bold">Day 1: New Moon</text>
  </svg>

  <!-- Contextual UI Control Block -->
  <div class="wax-wane-controls">
    <!-- Right Column: Interactive Buttons -->
    <div class="wax-wane-buttons-column">
      <button type="button" id="wax-wane-start">Start</button>
      <button type="button" id="wax-wane-stop">Stop</button>
    </div>
  </div>
</div>
