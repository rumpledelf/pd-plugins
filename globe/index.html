<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive 3D globe with clickable continents and countries">
  <title>World Globe — Interactive Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header UI -->
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <ellipse cx="12" cy="12" rx="4" ry="10"/>
            <path d="M2 12h20"/>
            <path d="M4.5 6.5h15"/>
            <path d="M4.5 17.5h15"/>
          </svg>
        </div>
        <h1>World Globe</h1>
      </div>
      <div class="header-center">
        <div class="mode-switcher" id="modeSwitcher">
          <button class="mode-btn active" data-mode="continents" id="btnContinents">
            <span class="mode-icon">🌍</span>
            Continents
          </button>
          <button class="mode-btn" data-mode="countries" id="btnCountries">
            <span class="mode-icon">🏳️</span>
            Countries
          </button>
          <div class="mode-indicator" id="modeIndicator"></div>
        </div>
      </div>
      <div class="header-right">
        <button class="recentre-btn" id="btnRecentre" title="Re-centre globe">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v4"/>
            <path d="M12 18v4"/>
            <path d="M2 12h4"/>
            <path d="M18 12h4"/>
          </svg>
          <span>Re-centre</span>
        </button>
        <div class="hint" id="hint">
          <span class="hint-icon">💡</span>
          <span class="hint-text">Click any region to navigate</span>
        </div>
      </div>
    </header>

    <!-- Globe container -->
    <div id="globeContainer"></div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip hidden">
      <div class="tooltip-name" id="tooltipName"></div>
      <div class="tooltip-url" id="tooltipUrl"></div>
      <div class="tooltip-hint">Click to visit →</div>
    </div>

    <!-- Info panel -->
    <div id="infoPanel" class="info-panel hidden">
      <div class="info-content">
        <div class="info-label" id="infoLabel">CONTINENT</div>
        <div class="info-name" id="infoName">—</div>
        <div class="info-url" id="infoUrl"></div>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading globe data…</div>
    </div>
  </div>

  <!-- Weekend offline fallback: local vendored dependencies. Restore the commented CDN includes after weekend if preferred. -->
  <script src="vendor/globe.gl.min.js"></script>
  <script src="vendor/topojson-client.min.js"></script>
  <!-- <script src="https://unpkg.com/globe.gl@2/dist/globe.gl.min.js"></script> -->
  <!-- <script src="https://unpkg.com/topojson-client@3"></script> -->
  <script src="app.js"></script>
</body>
</html>
